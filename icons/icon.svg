<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#4285f4"/>

  <!-- Open book -->
  <path d="
    M 18 44
    Q 36 36 60 46
    L 60 96
    Q 36 86 18 94
    Z
  " fill="#ffffff" opacity="0.95"/>

  <path d="
    M 110 44
    Q 92 36 68 46
    L 68 96
    Q 92 86 110 94
    Z
  " fill="#f1f3f4" opacity="0.95"/>

  <!-- Book spine -->
  <line x1="64" y1="44" x2="64" y2="96" stroke="#dadce0" stroke-width="2"/>

  <!-- Letter E (left page) -->
  <text x="36" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#4285f4" text-anchor="middle">E</text>

  <!-- Letter V (right page) -->
  <text x="92" y="76" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#4285f4" text-anchor="middle">V</text>
</svg>
